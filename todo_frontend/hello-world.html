<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: #f9fafb;
        color: #111827;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px 28px;
        max-width: 720px;
        width: calc(100% - 32px);
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.5;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main role="main" aria-label="Hello World Page">
      <h1>Hello World</h1>
      <p>
        This is a simple static page added to the frontend container. Open
        <code>todo_frontend/hello-world.html</code> in the preview to verify it
        renders.
      </p>
    </main>
  </body>
</html>
